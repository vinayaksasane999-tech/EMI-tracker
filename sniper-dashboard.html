<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foreclosure Sniper</title>
    
    <link rel="icon" type="image/png" href="Logo.PNG">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FC Sniper">
    <link rel="apple-touch-icon" href="Logo.PNG">

    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Foreclosure%20Sniper%22%2C%22short_name%22%3A%22FC%20Sniper%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23060816%22%2C%22theme_color%22%3A%22%23060816%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22Logo.PNG%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image/png%22%7D%5D%7D">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        body {
            background: #060816; color: white; padding: 24px; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start; overflow-x: hidden;
        }

        body::before { content: ''; position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, #f59e0b22, transparent 70%); top: -200px; left: -200px; z-index: -1; }
        body::after { content: ''; position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, #3b82f622, transparent 70%); bottom: -200px; right: -200px; z-index: -1; }

        .container { max-width: 800px; width: 100%; margin-top: 20px; }

        .header { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 20px; text-align: center; }
        .logo-frame {
            width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); background: #060816;
        }
        .logo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .header h1 { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #c084fc, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }

        .card { background: rgba(10, 15, 35, 0.82); border: 1px solid rgba(255, 255, 255, 0.06); backdrop-filter: blur(22px); border-radius: 30px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45); margin-bottom: 24px; }
        
        .section-title { font-size: 18px; font-weight: 700; color: #cbd5e1; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .target-setup { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }
        .target-setup label { font-size: 12px; color: #8b93b3; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .target-setup input { background: transparent; border: none; color: white; font-size: 18px; font-weight: bold; width: 90px; outline: none; text-align: right;}
        .target-setup input:focus { color: #c084fc; }

        .rings-wrapper { position: relative; display: flex; justify-content: space-around; gap: 20px; min-height: 260px; align-items: center; flex-wrap: wrap; transition: all 0.5s ease; }
        
        .ring-box {
            position: relative; display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.02); padding: 24px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.04);
            flex: 1; min-width: 220px; z-index: 2;
            transition: transform 0.6s cubic-bezier(0.5, 0, 0.2, 1), opacity 0.5s ease;
        }

        .ring-svg { width: 150px; height: 150px; transform: rotate(-90deg); }
        .ring-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
        .ring-fill { fill: none; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 377; stroke-dashoffset: 377; transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
        
        .ring-center-content { position: absolute; top: 99px; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; }
        .ring-pct { font-size: 28px; font-weight: 800; color: white; line-height: 1; }
        .ring-label { font-size: 13px; color: #8b93b3; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
        .ring-value { font-size: 14px; color: white; font-weight: bold; margin-top: 6px; text-align: center; line-height: 1.4; }
        
        .highlight-blue { color: #60a5fa; }
        .highlight-green { color: #4ade80; }

        .rings-wrapper.anim-collide #emiRingBox { transform: translateX(50%) scale(0) rotate(45deg); opacity: 0; pointer-events: none; }
        .rings-wrapper.anim-collide #savRingBox { transform: translateX(-40%) scale(0) rotate(-45deg); opacity: 0; pointer-events: none; }
        
        .graffiti-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        .particle { position: absolute; border-radius: 4px; opacity: 0; animation: burst 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        
        @keyframes burst {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
        }

        .merged-success {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); opacity: 0; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; z-index: 10;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%); padding: 40px; border-radius: 50%;
        }

        .rings-wrapper.anim-reveal { background: rgba(74, 222, 128, 0.05); border-radius: 24px; box-shadow: inset 0 0 100px rgba(74, 222, 128, 0.1); }
        .rings-wrapper.anim-reveal .merged-success { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }

        .merged-title { font-size: 20px; color: #4ade80; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(74, 222, 128, 0.5); }
        .merged-amount { font-size: 54px; font-weight: 900; color: white; letter-spacing: -2px; margin-bottom: 10px; }
        .merged-sub { font-size: 16px; color: #cbd5e1; font-weight: 500;}
        .merged-highlight { color: #4ade80; font-weight: bold;}

        .emi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .emi-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .emi-btn:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
        .emi-btn.paid { background: rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1); }
        .emi-month { font-size: 13px; color: #8b93b3; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .emi-amount { font-size: 18px; font-weight: 800; color: white; margin-bottom: 2px;}
        .emi-principal-sub { font-size: 11px; color: #8b93b3; font-style: italic; }
        .paid-badge { position: absolute; top: -10px; right: -10px; background: #3b82f6; color: white; font-size: 10px; font-weight: bold; padding: 12px 12px 4px 4px; border-radius: 50%; transform: scale(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .emi-btn.paid .paid-badge { transform: scale(1); }

        .savings-container { display: flex; gap: 15px; align-items: center; }
        .input { flex: 1; padding: 16px 20px; border-radius: 16px; border: 1px solid rgba(74, 222, 128, 0.3); background: rgba(74, 222, 128, 0.05); color: #4ade80; font-size: 18px; font-weight: bold; outline: none; transition: 0.3s; }
        .input::placeholder { color: rgba(74, 222, 128, 0.4); }
        .input:focus { border-color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .btn-add { padding: 16px 30px; border: none; border-radius: 16px; background: linear-gradient(135deg, #10b981, #059669); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
        .btn-reset { background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .btn-reset:hover { background: rgba(239, 68, 68, 0.1); }

        .history-list { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; padding-right: 8px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(74, 222, 128, 0.3); border-radius: 10px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .history-date { font-size: 12px; color: #8b93b3; font-weight: 600; margin-bottom: 2px; }
        .history-amount { font-size: 15px; color: #4ade80; font-weight: bold; }
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .delete-btn:hover { background: #ef4444; color: white; }

        @media (max-width: 768px) { .emi-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .emi-grid { grid-template-columns: 1fr 1fr; } .savings-container { flex-direction: column; } .btn-add { width: 100%; } .target-setup { width: 100%; justify-content: space-between;} .section-title { flex-direction: column; align-items: flex-start; gap: 15px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-frame">
            <img src="Logo.PNG" alt="Foreclosure Sniper Logo">
        </div>
        <h1>Foreclosure Sniper</h1>
    </div>

    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
      <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#c084fc" />
        <stop offset="100%" stop-color="#3b82f6" />
      </linearGradient>
      <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#10b981" />
        <stop offset="100%" stop-color="#4ade80" />
      </linearGradient>
    </svg>

    <div class="card">
        <div class="section-title">
            <span>Mission Dashboard</span>
            <div class="target-setup">
                <label>Closing Target: ₹</label>
                <input type="number" id="closingTargetInput" value="78208" oninput="updateUI()">
            </div>
        </div>
        
        <div class="rings-wrapper" id="ringsWrapper">
            <div class="graffiti-container" id="graffitiBox"></div>
            
            <div class="ring-box" id="emiRingBox">
                <svg class="ring-svg" viewBox="0 0 140 140">
                    <circle class="ring-track" cx="70" cy="70" r="60"></circle>
                    <circle class="ring-fill" id="emiRing" cx="70" cy="70" r="60" stroke="url(#blueGradient)"></circle>
                </svg>
                <div class="ring-center-content">
                    <div class="ring-pct" id="emiPct">0%</div>
                </div>
                <div class="ring-label">Principal Cleared</div>
                <div class="ring-value" id="emiText">₹0 / <span class="highlight-blue">₹0</span></div>
            </div>

            <div class="ring-box" id="savRingBox">
                <svg class="ring-svg" viewBox="0 0 140 140">
                    <circle class="ring-track" cx="70" cy="70" r="60"></circle>
                    <circle class="ring-fill" id="savRing" cx="70" cy="70" r="60" stroke="url(#greenGradient)"></circle>
                </svg>
                <div class="ring-center-content">
                    <div class="ring-pct" id="savPct">0%</div>
                </div>
                <div class="ring-label">Secret Stash</div>
                <div class="ring-value" id="savingsText">₹0 / <span class="highlight-green">₹60,000</span></div>
            </div>

            <div class="merged-success">
                <div class="merged-title">Target Locked. Foreclose Now.</div>
                <div class="merged-amount" id="finalPayAmount">₹0</div>
                <div class="merged-sub">Pay this exact amount from your <span class="merged-highlight" id="finalStashAmount">₹0</span> stash to kill the loan completely!</div>
            </div>

        </div>
    </div>

    <div class="card">
        <div class="section-title">First 12 Months EMI Checklist</div>
        <div class="emi-grid" id="emiGrid"></div>
    </div>

    <div class="card">
        <div class="section-title">Deposit to Secret Stash <button class="btn-reset" onclick="resetSavings()">Wipe History</button></div>
        <div class="savings-container">
            <input type="number" id="savingsInput" class="input" placeholder="₹ Enter saved amount...">
            <button class="btn-add" onclick="addSavings()">Add to Stash</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    const EMI_AMOUNT = 3810; 
    const TOTAL_EMIS = 12; // Out of the 24 months, tracking first 12
    const CIRCLE_CIRCUMFERENCE = 377; 

    const START_YEAR = 2026;
    const START_MONTH_INDEX = 7; 

    // Precise monthly principal tracking array mapped to your Rs. 78,208 reducing balance loan
    const MONTHLY_PRINCIPALS = [
        2833.05, // Month 1
        2868.44, // Month 2
        2904.27, // Month 3
        2940.55, // Month 4
        2977.28, // Month 5
        3014.47, // Month 6
        3052.12, // Month 7
        3090.25, // Month 8
        3128.85, // Month 9
        3167.93, // Month 10
        3207.50, // Month 11
        3247.57  // Month 12
    ];

    // Compute total targeted principal to track for these 12 months
    const TARGET_PRINCIPAL_TOTAL = MONTHLY_PRINCIPALS.reduce((a, b) => a + b, 0);
    const VISUAL_SAVINGS_TARGET = 60000; 

    let emiState = JSON.parse(localStorage.getItem('sniperEmiState')) || Array(TOTAL_EMIS).fill(false);
    if (emiState.length !== TOTAL_EMIS) {
        while(emiState.length < TOTAL_EMIS) emiState.push(false);
        emiState = emiState.slice(0, TOTAL_EMIS);
    }

    let savingsHistory = JSON.parse(localStorage.getItem('sniperSavingsHistory')) || [];
    let hasMerged = false;

    function init() {
        const savedTarget = localStorage.getItem('sniperClosingTarget');
        if(savedTarget) document.getElementById('closingTargetInput').value = savedTarget;
        renderEmiButtons();
        updateUI();
    }

    function renderEmiButtons() {
        const grid = document.getElementById('emiGrid');
        grid.innerHTML = '';
        
        emiState.forEach((isPaid, index) => {
            let date = new Date(START_YEAR, START_MONTH_INDEX + index, 1);
            let monthStr = date.toLocaleString('en-US', { month: 'short' });
            let yearStr = date.getFullYear();
            let label = `${monthStr}-${yearStr}`;
            let principalForThisMonth = MONTHLY_PRINCIPALS[index];

            const btn = document.createElement('div');
            btn.className = `emi-btn ${isPaid ? 'paid' : ''}`;
            btn.onclick = () => toggleEmi(index);
            btn.innerHTML = `
                <div class="paid-badge">✓</div>
                <div class="emi-month">${label}</div>
                <div class="emi-amount">₹${EMI_AMOUNT.toLocaleString('en-IN')}</div>
                <div class="emi-principal-sub">P: ₹${Math.round(principalForThisMonth).toLocaleString('en-IN')}</div>
            `;
            grid.appendChild(btn);
        });
    }

    function toggleEmi(index) {
        emiState[index] = !emiState[index];
        localStorage.setItem('sniperEmiState', JSON.stringify(emiState));
        updateUI();
        renderEmiButtons();
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9PntlLmNlc3BvbmRXaXRoKGZldGNoKGUucmVxdWVzdCkpfSk7')
            .catch(err => console.log("Service Worker skipped", err));
        });
    }

    function addSavings() {
        const input = document.getElementById('savingsInput');
        const amount = parseFloat(input.value);
        if (!isNaN(amount) && amount > 0) {
            savingsHistory.push({ id: Date.now(), amount: amount, date: new Date().toISOString() });
            localStorage.setItem('sniperSavingsHistory', JSON.stringify(savingsHistory));
            input.value = ''; 
            updateUI();
        }
    }

    function deleteHistoryItem(id) {
        savingsHistory = savingsHistory.filter(item => item.id !== id);
        localStorage.setItem('sniperSavingsHistory', JSON.stringify(savingsHistory));
        updateUI();
    }

    function resetSavings() {
        if(confirm("Are you sure you want to wipe your entire savings history?")) {
            savingsHistory = [];
            localStorage.setItem('sniperSavingsHistory', JSON.stringify(savingsHistory));
            updateUI();
        }
    }

    function fireGraffitiBurst() {
        const container = document.getElementById('graffitiBox');
        container.innerHTML = '';
        const colors = ['#4ade80', '#c084fc', '#60a5fa', '#f472b6', '#facc15'];
        
        for(let i=0; i<40; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let angle = Math.random() * Math.PI * 2;
            let distance = 50 + Math.random() * 150;
            p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            p.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            p.style.setProperty('--rot', (Math.random() * 360) + 'deg');
            
            let size = 5 + Math.random() * 15;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            if(Math.random() > 0.5) p.style.borderRadius = '50%'; 
            
            container.appendChild(p);
        }
    }

    function updateUI() {
        const closingTarget = parseFloat(document.getElementById('closingTargetInput').value) || 78208;
        localStorage.setItem('sniperClosingTarget', closingTarget); 

        // Calculate only the principal paid based on selected months
        let totalPrincipalPaid = 0;
        emiState.forEach((isPaid, index) => {
            if (isPaid) {
                totalPrincipalPaid += MONTHLY_PRINCIPALS[index];
            }
        });

        const totalSavings = savingsHistory.reduce((sum, item) => sum + item.amount, 0);
        const remainingLoan = closingTarget - totalPrincipalPaid;
        const ringsWrapper = document.getElementById('ringsWrapper');
        
        // Match condition logic using principal paid + stash savings against target
        if ((totalSavings + totalPrincipalPaid) >= closingTarget && closingTarget > 0) {
            if(!hasMerged) {
                hasMerged = true;
                ringsWrapper.classList.add('anim-collide');
                setTimeout(() => { fireGraffitiBurst(); }, 400);
                setTimeout(() => {
                    document.getElementById('finalPayAmount').innerText = `₹${Math.max(0, Math.round(remainingLoan)).toLocaleString('en-IN')}`;
                    document.getElementById('finalStashAmount').innerText = `₹${totalSavings.toLocaleString('en-IN')}`;
                    ringsWrapper.classList.add('anim-reveal');
                }, 800);
            }
        } else {
            if(hasMerged) {
                hasMerged = false;
                ringsWrapper.classList.remove('anim-collide', 'anim-reveal');
                document.getElementById('graffitiBox').innerHTML = ''; 
            }
        }

        const emiPercentage = Math.min((totalPrincipalPaid / TARGET_PRINCIPAL_TOTAL) * 100, 100);
        document.getElementById('emiPct').innerText = `${Math.round(emiPercentage)}%`;
        document.getElementById('emiText').innerHTML = `₹${Math.round(totalPrincipalPaid).toLocaleString('en-IN')} / <span class="highlight-blue">₹${Math.round(TARGET_PRINCIPAL_TOTAL).toLocaleString('en-IN')}</span><br><span style="font-size:11px;color:#8b93b3;">(Principal Component Only)</span>`;
        document.getElementById('emiRing').style.strokeDashoffset = CIRCLE_CIRCUMFERENCE - (emiPercentage / 100) * CIRCLE_CIRCUMFERENCE;

        const savingsPercentage = Math.min((totalSavings / VISUAL_SAVINGS_TARGET) * 100, 100);
        document.getElementById('savPct').innerText = `${Math.round(savingsPercentage)}%`;
        document.getElementById('savingsText').innerHTML = `₹${totalSavings.toLocaleString('en-IN')} / <span class="highlight-green">₹${VISUAL_SAVINGS_TARGET.toLocaleString('en-IN')}</span>`;
        document.getElementById('savRing').style.strokeDashoffset = CIRCLE_CIRCUMFERENCE - (savingsPercentage / 100) * CIRCLE_CIRCUMFERENCE;

        const historyContainer = document.getElementById('historyList');
        historyContainer.innerHTML = '';
        const reversedHistory = [...savingsHistory].reverse();
        reversedHistory.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div><div class="history-date">${new Date(item.date).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' })}</div><div class="history-amount">+ ₹${item.amount.toLocaleString('en-IN')}</div></div><button class="delete-btn" onclick="deleteHistoryItem(${item.id})">×</button>`;
            historyContainer.appendChild(div);
        });
    }

    window.onload = init;
</script>

</body>
</html>
